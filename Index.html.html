.container{max-width:1200px;margin:0 auto;padding:2rem 2.5rem}

.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

.slbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:4px}

  {Jornada:"1",Marca:"YPF",Anunciante:"YPF",TRPs:65.5,Partido:null,Canal:null,Target:"Hogares",Fecha:"06/06/2026",Jornada_ref:"1"},
  {Jornada:"2",Partido:"ARG vs Islandia",Fecha:"09/06/2026",Target:"Hogares",Canal:"Telefe",Rating:12.84,Share:74,Coview:32.5,Alcance:3800000,TRPs:null,Marca:null,Anunciante:null},
  {Jornada:"2",Partido:"ARG vs Islandia",Fecha:"09/06/2026",Target:"Hogares",Canal:"TyC",Rating:4.56,Share:26,Coview:27.4,Alcance:1400000,TRPs:null,Marca:null,Anunciante:null},
  {Jornada:"2",Partido:"ARG vs Islandia",Fecha:"09/06/2026",Target:"Hogares",Canal:"TVP",Rating:0.38,Share:2,Coview:16.2,Alcance:95000,TRPs:null,Marca:null,Anunciante:null},
  {Jornada:"2",Partido:"Francia vs Japon",Fecha:"09/06/2026",Target:"Hogares",Canal:"TyC",Rating:4.1,Share:78,Coview:24.3,Alcance:1300000,TRPs:null,Marca:null,Anunciante:null},
  {Jornada:"2",Partido:"Francia vs Japon",Fecha:"09/06/2026",Target:"Hogares",Canal:"Telefe",Rating:1.2,Share:22,Coview:18.1,Alcance:380000,TRPs:null,Marca:null,Anunciante:null},
  {Jornada:"2",Marca:"Pedidos Ya",Anunciante:"Pedidos Ya",TRPs:118.5,Partido:null,Canal:null,Target:"Hogares",Fecha:"09/06/2026",Jornada_ref:"2"},
  {Jornada:"2",Marca:"YPF",Anunciante:"YPF",TRPs:95.2,Partido:null,Canal:null,Target:"Hogares",Fecha:"09/06/2026",Jornada_ref:"2"},
  {Jornada:"2",Marca:"BPlay",Anunciante:"Grupo Boldt",TRPs:88.1,Partido:null,Canal:null,Target:"Hogares",Fecha:"09/06/2026",Jornada_ref:"2"},
];

let selectedJornada = "1";
let chartShare=null, chartEvol=null, chartDeepShare=null;

const jornadas = [...new Set(DATA.map(d=>d.Jornada))].sort((a,b)=>Number(a)-Number(b));

function init(){
  const chips = document.getElementById('chips');
  chips.innerHTML = jornadas.map(j=>`<button class="chip ${j===selectedJornada?'on':''}" onclick="selectJornada('${j}')" id="chip-${j}">J${j}</button>`).join('');
  renderResumen(selectedJornada);
  renderDeepDive();
}

function selectJornada(j){
  selectedJornada=j;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('chip-'+j).classList.add('on');
  const rows = DATA.filter(d=>d.Jornada===j&&d.Partido&&d.Canal&&d.Target==='Hogares');
  const fechas = [...new Set(rows.map(d=>d.Fecha))];
  document.getElementById('hdr-lbl').textContent='Fecha '+j;
  document.getElementById('hdr-val').textContent=fechas[0]||'—';
  renderResumen(j);
  renderDeepDive();
}

function getRows(j,target){return DATA.filter(d=>d.Jornada===j&&d.Partido&&d.Canal&&(d.Target===target||!d.Target));}
function getCanal(rows,canal){return rows.find(r=>(r.Canal||'').toLowerCase().includes(canal.toLowerCase()));}

function renderResumen(j){
  const rows = getRows(j,'Hogares');
  const prevJ = jornadas[jornadas.indexOf(j)-1];
  const prevRows = prevJ ? getRows(prevJ,'Hogares') : [];
  const canales = [{key:'Telefe',lbl:'Telefe'},{key:'TyC',lbl:'TyC Sports'},{key:'TVP',lbl:'TVP'}];
  const allRatings = canales.map(c=>{const r=getCanal(rows,c.key);return{...c,rat:r?r.Rating:0,shr:r?r.Share:0,cov:r?r.Coview:null,alc:r?r.Alcance:null};});
  const leader = allRatings.reduce((a,b)=>b.rat>a.rat?b:a);
  const fechas=[...new Set(rows.map(d=>d.Fecha))];

  let heroHTML = allRatings.map(c=>{
    const pr=getCanal(prevRows,c.key);
    const delta=pr?(c.rat-pr.Rating):null;
    return `<div class="hcard ${c.key===leader.key?'ldr':''}">
      ${c.key===leader.key?'<span class="lbadge">Líder</span>':''}
      <div class="hlbl">${c.lbl}</div>
      <div class="hval">${c.rat?c.rat.toFixed(2):'—'}<span class="hunit"> Rat%</span></div>
      <div class="hsub">Share: ${c.shr||'—'}%</div>
      ${delta!==null?`<div class="hdelta ${delta>=0?'up':'dn'}">${delta>=0?'▲':'▼'} ${Math.abs(delta).toFixed(2)} vs jornada ant.</div>`:''}
    </div>`;
  }).join('');

  const argRows = rows.filter(d=>d.Partido&&d.Partido.toUpperCase().includes('ARG'));
  const argPartido = argRows[0]?.Partido || null;
  let argHTML = '';
  if(argPartido){
    const argLider = argRows.reduce((a,b)=>(b.Rating>a.Rating?b:a),argRows[0]);
    argHTML=`<div class="arg">
      <div class="argt">Selección Argentina</div>
      <div class="arg-partido">${argPartido}</div>
      <div class="arg-lider">Señal líder: ${argLider.Canal} · ${argLider.Fecha}</div>
      <div class="argnums">
        <div class="anum"><div class="anv">${argLider.Rating.toFixed(2)}<span class="anu"> Rat%</span></div><div class="anl">Rating ${argLider.Canal}</div></div>
        <div class="anum"><div class="anv">${argLider.Share||'—'}<span class="anu">%</span></div><div class="anl">Share</div></div>
        <div class="anum"><div class="anv">${argLider.Coview?argLider.Coview.toFixed(1):'—'}</div><div class="anl">Coview%</div></div>
        <div class="anum"><div class="anv">${argLider.Alcance?(argLider.Alcance/1000000).toFixed(1)+'<span class="anu">M</span>':'—'}</div><div class="anl">Alcance</div></div>
      </div>
    </div>`;
  }

  const partidos=[...new Set(rows.map(d=>d.Partido))];
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  let otrosHTML='';
  if(otrosPartidos.length){
    otrosHTML=`<p class="slbl">Otros partidos de la jornada — señal líder</p><div class="otros-grid">`;
    otrosPartidos.forEach(partido=>{
      const pRows=rows.filter(d=>d.Partido===partido);
      const ldr=pRows.reduce((a,b)=>b.Rating>a.Rating?b:a,pRows[0]);
      otrosHTML+=`<div class="otro-card">
        <div class="otro-partido">${partido}</div>
        <div class="otro-fecha">${ldr.Fecha}</div>
        <div class="otro-canal">Líder: ${ldr.Canal}</div>
        <div class="otro-nums">
          <div class="otro-num"><div class="otro-val">${ldr.Rating.toFixed(2)}</div><div class="otro-lbl">Rat%</div></div>
          <div class="otro-num"><div class="otro-val">${ldr.Share||'—'}%</div><div class="otro-lbl">Share</div></div>
          <div class="otro-num"><div class="otro-val">${ldr.Coview?ldr.Coview.toFixed(1):'—'}</div><div class="otro-lbl">Coview</div></div>
        </div>
      </div>`;
    });
    otrosHTML+='</div>';
  }

  document.getElementById('resumen-content').innerHTML=`
    <div class="jornada-banner"><div class="num">0${j}</div><div class="info"><div class="info-title">Jornada ${j}</div><div class="info-date">${fechas.join(' · ')}</div></div></div>
    <p class="slbl">Líderes de la jornada</p>
    <div class="hgrid">${heroHTML}</div>
    ${argPartido?'<p class="slbl">Números de Argentina</p>':''}
    ${argHTML}
    ${otrosHTML}
  `;
}

function renderDeepDive(){
  const target=document.getElementById('target-select').value;
  const rows=getRows(selectedJornada,target);
  const partidos=[...new Set(rows.map(d=>d.Partido))];
  const argPartidos=partidos.filter(p=>p.toUpperCase().includes('ARG'));
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  const canales=[{key:'Telefe',lbl:'Telefe',color:'#0D1B3E'},{key:'TyC',lbl:'TyC Sports',color:'#B8924A'},{key:'TVP',lbl:'TVP',color:'#7BB8D4'}];

  const allJornadaRows=DATA.filter(d=>d.Partido&&d.Canal&&d.Target===target);
  const jornadas2=[...new Set(allJornadaRows.map(d=>d.Jornada))].sort((a,b)=>Number(a)-Number(b));

  function renderPartido(partido,isArg){
    const pRows=rows.filter(d=>d.Partido===partido);
    const fecha=pRows[0]?.Fecha||'';
    const ldr=pRows.reduce((a,b)=>b.Rating>a.Rating?b:a,pRows[0]);
    const totRat=pRows.reduce((s,r)=>s+r.Rating,0);
    const alc=ldr.Alcance;
    return `<div style="margin-bottom:2rem">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--gold)">
        ${isArg?'<span style="background:var(--gold);color:#fff;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:4px">Argentina</span>':''}
        <span style="font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;color:var(--navy)">${partido}</span>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">${fecha} · Target: ${target}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
        <div class="card" style="text-align:center;padding:1rem">
          <div style="font-family:Barlow Condensed,sans-serif;font-size:40px;font-weight:800;color:var(--navy);line-height:1">${totRat.toFixed(2)}<span style="font-size:14px;color:var(--gold)"> Rat%</span></div>
          <div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Rating total</div>
        </div>
        <div class="card" style="text-align:center;padding:1rem">
          <div style="font-family:Barlow Condensed,sans-serif;font-size:40px;font-weight:800;color:var(--navy);line-height:1">${ldr.Share||'—'}<span style="font-size:14px;color:var(--gold)">%</span></div>
          <div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Share líder</div>
        </div>
        <div class="card" style="text-align:center;padding:1rem">
          <div style="font-family:Barlow Condensed,sans-serif;font-size:40px;font-weight:800;color:var(--navy);line-height:1">${ldr.Coview?ldr.Coview.toFixed(1):'—'}</div>
          <div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Coview%</div>
        </div>
        <div class="card" style="text-align:center;padding:1rem">
          <div style="font-family:Barlow Condensed,sans-serif;font-size:40px;font-weight:800;color:var(--navy);line-height:1">${alc?(alc/1000000).toFixed(1):'—'}<span style="font-size:14px;color:var(--gold)">M</span></div>
          <div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Alcance</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${canales.map(c=>{
          const cr=pRows.find(r=>(r.Canal||'').toLowerCase().includes(c.key.toLowerCase()));
          return `<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:0.5px solid var(--border)">
            <div style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:${c.color};margin-bottom:6px">${c.lbl}</div>
            <div style="font-family:Barlow Condensed,sans-serif;font-size:28px;font-weight:800;color:var(--navy)">${cr?cr.Rating.toFixed(2):'—'}</div>
            <div style="font-size:10px;color:var(--gold);font-weight:700;margin-top:2px">${cr?cr.Share+'% shr':'—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const marcas=DATA.filter(d=>d.Jornada===selectedJornada&&d.Marca&&d.TRPs).sort((a,b)=>b.TRPs-a.TRPs);
  const maxTRP=marcas[0]?.TRPs||1;
  const sovHTML=marcas.length?`
    <p class="slbl" style="margin-top:0">Ranking marcas — TRPs acumulados</p>
    <div class="card">
      <div class="ctitle">Top marcas por presencia en tanda</div>
      <div class="csub">TRPs cross todos los partidos · Target: ${target}</div>
      ${marcas.map((m,i)=>`<div class="sov-row">
        <span class="sov-rank">${String(i+1).padStart(2,'0')}</span>
        <div style="flex:1"><div class="sov-marca">${m.Marca}</div><div class="sov-anunc">${m.Anunciante}</div></div>
        <div class="sov-bw"><div class="sov-bar" style="width:${Math.round(m.TRPs/maxTRP*100)}%"></div></div>
        <span class="sov-trp">${m.TRPs.toFixed(1)} TRPs</span>
      </div>`).join('')}
    </div>`:'';

  const evolHTML=`
    <p class="slbl" style="margin-top:0">Evolución de Rating% — todas las jornadas</p>
    <div class="card">
      <div class="ctitle">Tendencia histórica por canal</div>
      <div class="csub">Rating% · Target: ${target}</div>
      <div class="leg">
        ${canales.map(c=>`<span class="li"><span class="ld" style="background:${c.color}"></span>${c.lbl}</span>`).join('')}
      </div>
      <div style="position:relative;height:240px"><canvas id="chartEvol" role="img" aria-label="Evolución rating">Evolución rating</canvas></div>
    </div>`;

  let html='';
  if(argPartidos.length){html+='<p class="slbl">Partido de Argentina</p>'+argPartidos.map(p=>renderPartido(p,true)).join('');}
  if(otrosPartidos.length){html+='<p class="slbl">Resto de partidos</p>'+otrosPartidos.map(p=>renderPartido(p,false)).join('');}
  html+=`<div class="two">${sovHTML}${evolHTML}</div>`;
  document.getElementById('deepdive-content').innerHTML=html;

  setTimeout(()=>{
    const ctx=document.getElementById('chartEvol');
    if(!ctx) return;
    if(chartEvol) chartEvol.destroy();
    chartEvol=new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{
        labels:jornadas2.map(j=>'J'+j),
        datasets:canales.map(c=>({
          label:c.lbl,
          data:jornadas2.map(jj=>{
            const r=allJornadaRows.filter(d=>d.Jornada===jj).find(d=>(d.Canal||'').toLowerCase().includes(c.key.toLowerCase()));
            return r?r.Rating:null;
          }),
          borderColor:c.color,backgroundColor:'transparent',tension:0.3,pointRadius:5,borderWidth:2.5
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#4A5568'}},x:{grid:{display:false},ticks:{font:{size:11},color:'#4A5568'}}}}
    });
  },100);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('on');
}

init();
<\/script>
</body>
