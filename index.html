<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSA Mundial 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B3E;--gold:#B8924A;--sky:#5BA3C9;--skylt:#C8E8F5;--bg:#F2F4F8;--surface:#fff;--border:rgba(13,27,62,0.12);--text:#0D1B3E;--text2:#4A5568;--r:12px}
body{font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:0.1em}
.hdr-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:0.06em;text-transform:uppercase;text-align:center}
.hdr-title em{color:var(--gold);font-style:normal}
.hdr-right{text-align:right}
.hdr-lbl{font-size:9px;color:var(--skylt);letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.hdr-val{font-size:13px;color:#fff;font-weight:700;margin-top:2px}
.tabbar{background:var(--navy);border-top:1px solid rgba(255,255,255,0.1);display:flex;padding:0 2rem;gap:4px}
.tab{padding:10px 22px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
.tab:hover{color:#fff}
.tab.on{background:var(--sky);color:#fff;border-bottom-color:var(--sky)}
.container{max-width:1100px;margin:0 auto;padding:1.75rem 2rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.jbar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.jlbl{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
.chip{padding:4px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.slbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;margin-top:2px}
.jbanner{display:inline-flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 20px;margin-bottom:1.25rem}
.jbanner .num{font-size:44px;font-weight:800;color:var(--gold);line-height:1}
.jbanner .ititle{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:var(--navy)}
.jbanner .idate{font-size:11px;color:var(--text2);margin-top:2px}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.hcard{background:var(--navy);border-radius:var(--r);padding:1.1rem 1.3rem;position:relative;overflow:hidden}
.hcard.ldr{border:2px solid var(--gold)}
.hlbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--skylt);margin-bottom:5px}
.hval{font-size:42px;font-weight:800;color:#fff;line-height:1}
.hunit{font-size:14px;color:var(--gold);font-weight:700}
.hsub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:5px}
.hdelta{font-size:11px;font-weight:700;margin-top:4px}
.hdelta.up{color:#4ADE80}.hdelta.dn{color:#F87171}
.lbadge{position:absolute;top:8px;right:10px;background:var(--gold);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.arg{background:var(--navy);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.5rem;border-left:5px solid var(--gold)}
.argt{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.arg-partido{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.arg-lider{font-size:10px;color:var(--skylt);margin-bottom:.75rem;font-weight:600}
.argnums{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.anum{text-align:center;border-right:0.5px solid rgba(255,255,255,0.1);padding-right:10px}
.anum:last-child{border-right:none}
.anv{font-size:32px;font-weight:800;color:#fff;line-height:1}
.anu{font-size:12px;color:var(--gold);font-weight:700}
.anl{font-size:8px;color:var(--skylt);letter-spacing:0.06em;text-transform:uppercase;margin-top:4px;font-weight:600}
.otros-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.otro-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem}
.otro-partido{font-size:14px;font-weight:800;text-transform:uppercase;color:var(--navy);margin-bottom:2px}
.otro-fecha{font-size:10px;color:var(--text2);margin-bottom:4px}
.otro-canal{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:8px;text-transform:uppercase}
.otro-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.otro-num{text-align:center;background:var(--bg);border-radius:7px;padding:7px 4px}
.otro-val{font-size:20px;font-weight:800;color:var(--navy);line-height:1}
.otro-lbl{font-size:8px;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;font-weight:600}
.target-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.target-lbl{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
select{padding:6px 24px 6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--navy);font-size:13px;font-weight:600;cursor:pointer;outline:none}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:1.1rem}
.ctitle{font-size:13px;font-weight:800;text-transform:uppercase;color:var(--navy);margin-bottom:2px}
.csub{font-size:11px;color:var(--text2);margin-bottom:.75rem}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.ld{width:9px;height:9px;border-radius:2px}
.sov-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.sov-row:last-child{border-bottom:none}
.sov-rank{font-size:16px;font-weight:800;color:var(--gold);min-width:24px}
.sov-marca{flex:1;font-weight:600;color:var(--navy);font-size:12px}
.sov-anunc{font-size:10px;color:var(--text2)}
.sov-bw{flex:1.5;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.sov-bar{height:100%;border-radius:3px;background:var(--gold)}
.sov-trp{font-size:13px;font-weight:800;color:var(--navy);min-width:65px;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;color:var(--text2)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fee2e2;border:0.5px solid #fca5a5;border-radius:var(--r);padding:1.5rem;color:#7f1d1d;text-align:center;margin:2rem 0;font-size:13px;line-height:1.6}
footer{text-align:center;padding:1.25rem;font-size:10px;color:var(--text2);border-top:0.5px solid var(--border);margin-top:1rem}
@media(max-width:768px){
  header{padding:0 1rem}.tabbar{padding:0 1rem}.container{padding:1rem}
  .hgrid{grid-template-columns:1fr}.argnums{grid-template-columns:repeat(2,1fr)}
  .otros-grid{grid-template-columns:1fr}.hdr-title{font-size:14px}
}
</style>
</head>
<body>
<header>
  <div class="hdr-logo">OSA</div>
  <div class="hdr-title">OSA <em>Mundial</em> 2026</div>
  <div class="hdr-right">
    <div class="hdr-lbl" id="hdr-lbl">Fecha 1</div>
    <div class="hdr-val" id="hdr-val">&mdash;</div>
  </div>
</header>
<div class="tabbar">
  <button class="tab on" onclick="switchTab('resumen',this)">Resumen</button>
  <button class="tab" onclick="switchTab('deepdive',this)">Deepdive partidos</button>
</div>
<div class="container">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <span>Cargando datos Kantar IBOPE&hellip;</span>
  </div>
  <div id="error-state" style="display:none"></div>
  <div id="main-content" style="display:none">
    <div class="jbar">
      <span class="jlbl">Jornada</span>
      <div id="chips"></div>
    </div>
    <div class="tab-panel active" id="tab-resumen"><div id="resumen-content"></div></div>
    <div class="tab-panel" id="tab-deepdive">
      <div class="target-bar">
        <span class="target-lbl">Target</span>
        <select id="target-select" onchange="renderDeepDive()">
          <option value="Hogares">Hogares</option>
          <option value="Personas">Total personas</option>
          <option value="20+">20+</option>
        </select>
      </div>
      <div id="deepdive-content"></div>
    </div>
  </div>
</div>
<footer>Fuente: Kantar IBOPE Media &middot; OSA One Step Ahead &middot; Datos actualizados diariamente</footer>
<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRk-5uM_irUx6DNa8jEeL24hYdeyJhHamNZWAEqwBSLcWj8EwINeEnWlNzP5VlwiubzMdnih5iKlfJc/pub?output=csv';
let allData=[],jornadas=[],selectedJornada=null,chartEvol=null;

function pn(s){
  if(s===null||s===undefined||String(s).trim()===''||String(s).trim()==='.')return null;
  return parseFloat(String(s).replace(',','.'));
}

function loadData(){
  Papa.parse(SHEET_URL,{
    download:true,skipEmptyLines:true,
    complete:function(r){
      try{
        let hdrIdx=-1;
        for(let i=0;i<r.data.length;i++){
          if(r.data[i].some(c=>String(c).trim()==='Jornada')){hdrIdx=i;break;}
        }
        if(hdrIdx<0){showError('No se encontró la cabecera. Verificá que el Sheet tenga la columna "Jornada".');return;}
        const headers=r.data[hdrIdx].map(h=>String(h).trim());
        allData=[];
        for(let i=hdrIdx+1;i<r.data.length;i++){
          const row=r.data[i];
          if(!row[0]||String(row[0]).trim()==='')continue;
          const obj={};
          headers.forEach((h,j)=>obj[h]=row[j]?String(row[j]).trim():'');
          if(obj['Jornada']&&obj['PARTIDO']&&obj['CANAL'])allData.push(obj);
        }
        jornadas=[...new Set(allData.map(d=>d['Jornada']))].sort((a,b)=>Number(a)-Number(b));
        if(!jornadas.length){showError('No se encontraron filas de partidos. Verificá el formato del Sheet.');return;}
        document.getElementById('loading-state').style.display='none';
        document.getElementById('main-content').style.display='block';
        document.getElementById('chips').innerHTML=jornadas.map(j=>`<button class="chip" id="chip-${j}" onclick="selectJornada('${j}')">J${j}</button>`).join('');
        selectJornada(jornadas[jornadas.length-1]);
      }catch(e){showError('Error procesando datos: '+e.message);}
    },
    error:function(e){showError('No se pudo cargar el Sheet. Verificá que la URL sea pública.');}
  });
}

function selectJornada(j){
  selectedJornada=j;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const ch=document.getElementById('chip-'+j);if(ch)ch.classList.add('on');
  const rows=getRows(j,'Hogares');
  const fechas=[...new Set(rows.map(d=>d['FECHA FIFA']))];
  document.getElementById('hdr-lbl').textContent='Fecha '+j;
  document.getElementById('hdr-val').textContent=fechas[0]||'—';
  renderResumen(j);
  renderDeepDive();
}

function getRows(j,target){return allData.filter(d=>d['Jornada']==j&&d['TARGET']===target);}
function getCanal(rows,canal){return rows.find(r=>String(r['CANAL']||'').toUpperCase().includes(canal.toUpperCase()));}

function renderResumen(j){
  const rows=getRows(j,'Hogares');
  const prevJ=jornadas[jornadas.indexOf(j)-1];
  const prevRows=prevJ?getRows(prevJ,'Hogares'):[];
  const canales=[{key:'TELEFE',lbl:'Telefe'},{key:'TYC',lbl:'TyC Sports'},{key:'TVP',lbl:'TVP'}];
  const withRat=canales.map(c=>{const r=getCanal(rows,c.key);return{...c,rat:r?pn(r['Rat%'])||0:0,shr:r?pn(r['Shr%'])||0:0,cov:r?pn(r['Coview%']):null,alc:r?pn(r['Alcance Neto']):null};});
  const leader=withRat.reduce((a,b)=>b.rat>a.rat?b:a);
  const fechas=[...new Set(rows.map(d=>d['FECHA FIFA']))];

  const heroHTML=withRat.map(c=>{
    const pr=getCanal(prevRows,c.key);
    const prevRat=pr?pn(pr['Rat%']):null;
    const delta=prevRat!==null?(c.rat-prevRat):null;
    return '<div class="hcard '+(c.key===leader.key?'ldr':'')+'">'+
      (c.key===leader.key?'<span class="lbadge">Líder</span>':'')+
      '<div class="hlbl">'+c.lbl+'</div>'+
      '<div class="hval">'+(c.rat?c.rat.toFixed(2):'&mdash;')+'<span class="hunit"> Rat%</span></div>'+
      '<div class="hsub">Share: '+(c.shr||'&mdash;')+'%</div>'+
      (delta!==null?'<div class="hdelta '+(delta>=0?'up':'dn')+'">'+(delta>=0?'&#9650;':'&#9660;')+' '+Math.abs(delta).toFixed(2)+' vs jornada ant.</div>':'')+
      '</div>';
  }).join('');

  const argRows=rows.filter(d=>d['PARTIDO']&&d['PARTIDO'].toUpperCase().includes('ARG'));
  const argPartido=argRows.length?argRows[0]['PARTIDO']:null;
  let argHTML='';
  if(argPartido){
    const argLider=argRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,argRows[0]);
    const lRat=pn(argLider['Rat%']),lShr=pn(argLider['Shr%']),lCov=pn(argLider['Coview%']),lAlc=pn(argLider['Alcance Neto']);
    argHTML='<p class="slbl">Números de Argentina</p>'+
      '<div class="arg"><div class="argt">Selección Argentina</div>'+
      '<div class="arg-partido">'+argPartido+'</div>'+
      '<div class="arg-lider">Señal líder: '+argLider['CANAL']+'</div>'+
      '<div class="argnums">'+
      '<div class="anum"><div class="anv">'+(lRat?lRat.toFixed(2):'&mdash;')+'<span class="anu"> Rat%</span></div><div class="anl">Rating '+argLider['CANAL']+'</div></div>'+
      '<div class="anum"><div class="anv">'+(lShr||'&mdash;')+'<span class="anu">%</span></div><div class="anl">Share</div></div>'+
      '<div class="anum"><div class="anv">'+(lCov?lCov.toFixed(1):'&mdash;')+'</div><div class="anl">Coview%</div></div>'+
      '<div class="anum"><div class="anv">'+(lAlc?(lAlc/1000000).toFixed(1):'&mdash;')+'<span class="anu">'+(lAlc?' M':'')+'</span></div><div class="anl">Alcance</div></div>'+
      '</div></div>';
  }

  const partidos=[...new Set(rows.map(d=>d['PARTIDO']))];
  const otros=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  let otrosHTML='';
  if(otros.length){
    otrosHTML='<p class="slbl">Otros partidos &mdash; señal líder</p><div class="otros-grid">';
    otros.forEach(partido=>{
      const pRows=rows.filter(d=>d['PARTIDO']===partido);
      const ldr=pRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,pRows[0]);
      const rat=pn(ldr['Rat%']),shr=pn(ldr['Shr%']),cov=pn(ldr['Coview%']);
      otrosHTML+='<div class="otro-card">'+
        '<div class="otro-partido">'+partido+'</div>'+
        '<div class="otro-fecha">'+(ldr['FECHA FIFA']||'')+'</div>'+
        '<div class="otro-canal">Líder: '+(ldr['CANAL']||'&mdash;')+'</div>'+
        '<div class="otro-nums">'+
        '<div class="otro-num"><div class="otro-val">'+(rat?rat.toFixed(2):'&mdash;')+'</div><div class="otro-lbl">Rat%</div></div>'+
        '<div class="otro-num"><div class="otro-val">'+(shr?shr+'%':'&mdash;')+'</div><div class="otro-lbl">Share</div></div>'+
        '<div class="otro-num"><div class="otro-val">'+(cov?cov.toFixed(1):'&mdash;')+'</div><div class="otro-lbl">Coview</div></div>'+
        '</div></div>';
    });
    otrosHTML+='</div>';
  }

  document.getElementById('resumen-content').innerHTML=
    '<div class="jbanner"><div class="num">0'+j+'</div><div class="info"><div class="ititle">Jornada '+j+'</div><div class="idate">'+fechas.join(' &middot; ')+'</div></div></div>'+
    '<p class="slbl">Líderes de la jornada</p>'+
    '<div class="hgrid">'+heroHTML+'</div>'+
    argHTML+otrosHTML;
}

function renderDeepDive(){
  if(!selectedJornada)return;
  const target=document.getElementById('target-select').value;
  const rows=getRows(selectedJornada,target);
  const partidos=[...new Set(rows.map(d=>d['PARTIDO']))];
  const argPartidos=partidos.filter(p=>p.toUpperCase().includes('ARG'));
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  const canales=[{key:'TELEFE',lbl:'Telefe',color:'#0D1B3E'},{key:'TYC',lbl:'TyC Sports',color:'#B8924A'},{key:'TVP',lbl:'TVP',color:'#7BB8D4'}];
  const allJRows=allData.filter(d=>d['TARGET']===target);
  const jAll=[...new Set(allJRows.map(d=>d['Jornada']))].sort((a,b)=>Number(a)-Number(b));

  function rpdo(partido,isArg){
    const pRows=rows.filter(d=>d['PARTIDO']===partido);
    const ldr=pRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,pRows[0]);
    const totRat=pRows.reduce((s,r)=>s+(pn(r['Rat%'])||0),0);
    const alc=pn(ldr['Alcance Neto']),cov=pn(ldr['Coview%']),shr=pn(ldr['Shr%']);
    return '<div style="margin-bottom:2rem">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding-bottom:8px;border-bottom:2px solid var(--gold)">'+
      (isArg?'<span style="background:var(--gold);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;text-transform:uppercase">Argentina</span>':'')+
      '<span style="font-size:16px;font-weight:800;text-transform:uppercase;color:var(--navy)">'+partido+'</span>'+
      '<span style="font-size:11px;color:var(--text2);margin-left:auto">'+(ldr['FECHA FIFA']||'')+' &middot; '+target+'</span></div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">'+
      '<div class="card" style="text-align:center;padding:.9rem"><div style="font-size:34px;font-weight:800;color:var(--navy);line-height:1">'+(totRat?totRat.toFixed(2):'&mdash;')+'<span style="font-size:12px;color:var(--gold)"> Rat%</span></div><div style="font-size:8px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:600">Rating total</div></div>'+
      '<div class="card" style="text-align:center;padding:.9rem"><div style="font-size:34px;font-weight:800;color:var(--navy);line-height:1">'+(shr||'&mdash;')+'<span style="font-size:12px;color:var(--gold)">%</span></div><div style="font-size:8px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:600">Share líder</div></div>'+
      '<div class="card" style="text-align:center;padding:.9rem"><div style="font-size:34px;font-weight:800;color:var(--navy);line-height:1">'+(cov?cov.toFixed(1):'&mdash;')+'</div><div style="font-size:8px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:600">Coview%</div></div>'+
      '<div class="card" style="text-align:center;padding:.9rem"><div style="font-size:34px;font-weight:800;color:var(--navy);line-height:1">'+(alc?(alc/1000000).toFixed(1):'&mdash;')+'<span style="font-size:12px;color:var(--gold)">'+(alc?' M':'')+'</span></div><div style="font-size:8px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:600">Alcance</div></div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
      canales.map(c=>{const cr=getCanal(pRows,c.key);const rat=cr?pn(cr['Rat%']):null;const s=cr?pn(cr['Shr%']):null;
        return '<div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center;border:0.5px solid var(--border)">'+
          '<div style="font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:'+c.color+';margin-bottom:5px">'+c.lbl+'</div>'+
          '<div style="font-size:24px;font-weight:800;color:var(--navy)">'+(rat!==null?rat.toFixed(2):'&mdash;')+'</div>'+
          '<div style="font-size:9px;color:var(--gold);font-weight:700;margin-top:2px">'+(s!==null?s+'% shr':'&mdash;')+'</div></div>';
      }).join('')+'</div></div>';
  }

  const evolHTML='<p class="slbl">Evolución de Rating% &mdash; todas las jornadas</p>'+
    '<div class="card"><div class="ctitle">Tendencia histórica por canal</div><div class="csub">Rating% &middot; Target: '+target+'</div>'+
    '<div class="leg">'+canales.map(c=>'<span class="li"><span class="ld" style="background:'+c.color+'"></span>'+c.lbl+'</span>').join('')+'</div>'+
    '<div style="position:relative;height:220px"><canvas id="chartEvol"></canvas></div></div>';

  let html='';
  if(argPartidos.length)html+='<p class="slbl">Partido de Argentina</p>'+argPartidos.map(p=>rpdo(p,true)).join('');
  if(otrosPartidos.length)html+='<p class="slbl">Resto de partidos</p>'+otrosPartidos.map(p=>rpdo(p,false)).join('');
  html+=evolHTML;
  document.getElementById('deepdive-content').innerHTML=html;

  setTimeout(()=>{
    const ctx=document.getElementById('chartEvol');if(!ctx)return;
    if(chartEvol)chartEvol.destroy();
    chartEvol=new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels:jAll.map(j=>'J'+j),datasets:canales.map(c=>({label:c.lbl,
        data:jAll.map(jj=>{const r=allJRows.filter(d=>d['Jornada']==jj).find(d=>String(d['CANAL']||'').toUpperCase().includes(c.key));return r?pn(r['Rat%']):null;}),
        borderColor:c.color,backgroundColor:'transparent',tension:0.3,pointRadius:5,borderWidth:2.5}))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#4A5568'}},
        x:{grid:{display:false},ticks:{font:{size:11},color:'#4A5568'}}}}
    });
  },150);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('on');
}
function showError(msg){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
  document.getElementById('error-state').innerHTML='<div class="error-msg">'+msg+'</div>';
}
loadData();
</script>
</body>
</html>
