<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B3E;--gold:#B8924A;--sky:#5BA3C9;--skylt:#C8E8F5;--bg:#F2F4F8;--surface:#fff;--border:rgba(13,27,62,0.12);--text:#0D1B3E;--text2:#4A5568;--r:12px}
body{font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:0 2.5rem;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo img{height:30px;filter:invert(1) brightness(10)}
.hdr-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:0.06em;text-transform:uppercase;text-align:center}
.hdr-title em{color:var(--gold);font-style:normal}
.hdr-right{text-align:right;min-width:100px}
.hdr-lbl{font-size:9px;color:var(--skylt);letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.hdr-val{font-size:14px;color:#fff;font-weight:700;margin-top:3px;letter-spacing:0.04em}
.tabbar{background:var(--navy);border-top:1px solid rgba(255,255,255,0.1);display:flex;padding:0 2.5rem;gap:4px}
.tab{padding:11px 24px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
.tab:hover{color:#fff}
.tab.on{background:var(--sky);color:#fff;border-bottom-color:var(--sky)}
.container{max-width:1200px;margin:0 auto;padding:2rem 2.5rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.jbar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.jlbl{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.slbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:4px}
.jornada-banner{display:inline-flex;align-items:center;gap:14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 22px;margin-bottom:1.5rem}
.jornada-banner .num{font-size:48px;font-weight:800;color:var(--gold);line-height:1}
.jornada-banner .info-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy)}
.jornada-banner .info-date{font-size:12px;color:var(--text2);margin-top:2px}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem}
.hcard{background:var(--navy);border-radius:var(--r);padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.hcard.ldr{border:2px solid var(--gold)}
.hlbl{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--skylt);margin-bottom:6px}
.hval{font-size:46px;font-weight:800;color:#fff;line-height:1}
.hunit{font-size:15px;color:var(--gold);font-weight:700;margin-left:2px}
.hsub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:6px}
.hdelta{font-size:12px;font-weight:700;margin-top:5px}

.lbadge{position:absolute;top:10px;right:12px;background:var(--gold);color:#fff;font-size:8px;font-weight:800;letter-spacing:0.08em;padding:3px 9px;border-radius:12px;text-transform:uppercase}
.arg{background:var(--navy);border-radius:var(--r);padding:1.5rem 1.75rem;margin-bottom:1.75rem;border-left:5px solid var(--gold)}

.arg-partido{font-size:20px;font-weight:800;color:#fff;margin-bottom:6px}

.otros-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.75rem}
.otro-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem}

.otro-fecha{font-size:11px;color:var(--text2);margin-bottom:6px}

.target-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}

select{padding:7px 28px 7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--navy);font-size:13px;font-weight:600;cursor:pointer;outline:none}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.25rem}

.csub{font-size:12px;color:var(--text2);margin-bottom:1rem}
.two{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.leg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:10px;height:10px;border-radius:2px}
.sov-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.sov-row:last-child{border-bottom:none}
.sov-rank{font-size:18px;font-weight:800;color:var(--gold);min-width:28px}
.sov-marca{flex:1;font-weight:600;color:var(--navy);font-size:13px}
.sov-anunc{font-size:11px;color:var(--text2)}
.sov-bw{flex:1.5;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.sov-bar{height:100%;border-radius:3px;background:var(--gold)}
.sov-trp{font-size:14px;font-weight:800;color:var(--navy);min-width:70px;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fee2e2;border:0.5px solid #fca5a5;border-radius:var(--r);padding:1.5rem;color:#7f1d1d;text-align:center;margin:2rem 0}
footer{text-align:center;padding:1.5rem;font-size:11px;color:var(--text2);border-top:0.5px solid var(--border);margin-top:1rem}
@media(max-width:768px){
  header{padding:0 1rem}.tabbar{padding:0 1rem}.container{padding:1.25rem 1rem}

  .otros-grid{grid-template-columns:1fr}.two{grid-template-columns:1fr}.hdr-title{font-size:15px}
}
</style>

<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRk-5uM_irUx6DNa8jEeL24hYdeyJhHamNZWAEqwBSLcWj8EwINeEnWlNzP5VlwiubzMdnih5iKlfJc/pub?gid=0&single=true&output=csv';
let allData=[],jornadas=[],selectedJornada=null,chartEvol=null;

function parseNum(s){if(!s||s.toString().trim()==='.'||s.toString().trim()==='')return null;return parseFloat(s.toString().replace(',','.'))}

function loadData(){
  Papa.parse(SHEET_URL,{
    download:true,header:true,skipEmptyLines:true,
    complete:function(r){
      try{
        allData=r.data.filter(row=>row.Jornada&&row.Partido);
        jornadas=[...new Set(allData.map(d=>d.Jornada))].sort((a,b)=>Number(a)-Number(b));
        if(!jornadas.length){showError('Sin datos. Verificá el formato del Sheet.');return;}
        document.getElementById('loading-state').style.display='none';
        document.getElementById('main-content').style.display='block';
        const chips=document.getElementById('chips');
        chips.innerHTML=jornadas.map(j=>`<button class="chip" id="chip-${j}" onclick="selectJornada('${j}')">J${j}</button>`).join('');
        selectJornada(jornadas[jornadas.length-1]);
      }catch(e){showError('Error: '+e.message);}
    },
    error:function(){showError('No se pudo cargar el Sheet. Verificá que la URL sea pública.');}
  });
}

function selectJornada(j){
  selectedJornada=j;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('chip-'+j).classList.add('on');
  const rows=allData.filter(d=>d.Jornada==j&&d.Target==='Hogares');
  const fechas=[...new Set(rows.map(d=>d.Fecha))];
  document.getElementById('hdr-lbl').textContent='Fecha '+j;
  document.getElementById('hdr-val').textContent=fechas[0]||'—';
  renderResumen(j);
  renderDeepDive();
}

function getCanal(rows,canal){return rows.find(r=>(r.Canal||'').toLowerCase().includes(canal.toLowerCase()));}
function getRows(j,target){return allData.filter(d=>d.Jornada==j&&d.Partido&&d.Canal&&(d.Target===target||!d.Target));}

function renderResumen(j){
  const rows=getRows(j,'Hogares');
  const prevJ=jornadas[jornadas.indexOf(j)-1];
  const prevRows=prevJ?getRows(prevJ,'Hogares'):[];
  const canales=[{key:'Telefe',lbl:'Telefe'},{key:'TyC',lbl:'TyC Sports'},{key:'TVP',lbl:'TVP'}];
  const withRat=canales.map(c=>{const r=getCanal(rows,c.key);return{...c,rat:r?parseNum(r.Rating)||0:0,shr:r?parseNum(r.Share)||0:0,cov:r?parseNum(r.Coview):null,alc:r?parseNum(r.Alcance):null,row:r};});
  const leader=withRat.reduce((a,b)=>b.rat>a.rat?b:a);
  const fechas=[...new Set(rows.map(d=>d.Fecha))];

  const heroHTML=withRat.map(c=>{
    const pr=getCanal(prevRows,c.key);
    const prevRat=pr?parseNum(pr.Rating):null;
    const delta=prevRat!==null?(c.rat-prevRat):null;
    return`<div class="hcard ${c.key===leader.key?'ldr':''}">
      ${c.key===leader.key?'<span class="lbadge">Líder</span>':''}
      <div class="hlbl">${c.lbl}</div>
      <div class="hval">${c.rat?c.rat.toFixed(2):'—'}<span class="hunit"> Rat%</span></div>
      <div class="hsub">Share: ${c.shr||'—'}%</div>
      ${delta!==null?`<div class="hdelta ${delta>=0?'up':'dn'}">${delta>=0?'▲':'▼'} ${Math.abs(delta).toFixed(2)} vs jornada ant.</div>`:''}
    </div>`;
  }).join('');

  const argRows=rows.filter(d=>d.Partido&&d.Partido.toUpperCase().includes('ARG'));
  const argPartido=argRows.length?argRows[0].Partido:null;
  let argHTML='';
  if(argPartido){
    const argCanales=argRows;
    const argLider=argCanales.reduce((a,b)=>(parseNum(b.Rating)||0)>(parseNum(a.Rating)||0)?b:a,argCanales[0]);
    const lRat=parseNum(argLider.Rating);
    const lShr=parseNum(argLider.Share);
    const lCov=parseNum(argLider.Coview);
    const lAlc=parseNum(argLider.Alcance);
    argHTML=`<p class="slbl">Números de Argentina</p>
    <div class="arg">
      <div class="argt">Selección Argentina</div>
      <div class="arg-partido">${argPartido}</div>
      <div class="arg-lider">Señal líder: ${argLider.Canal||'—'}</div>
      <div class="argnums">
        <div class="anum"><div class="anv">${lRat?lRat.toFixed(2):'—'}<span class="anu"> Rat%</span></div><div class="anl">Rating ${argLider.Canal||''}</div></div>
        <div class="anum"><div class="anv">${lShr||'—'}<span class="anu">%</span></div><div class="anl">Share</div></div>
        <div class="anum"><div class="anv">${lCov?lCov.toFixed(1):'—'}</div><div class="anl">Coview%</div></div>
        <div class="anum"><div class="anv">${lAlc?(lAlc/1000000).toFixed(1):'—'}<span class="anu">${lAlc?'M':''}</span></div><div class="anl">Alcance</div></div>
      </div>
    </div>`;
  }

  const partidos=[...new Set(rows.map(d=>d.Partido))];
  const otros=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  let otrosHTML='';
  if(otros.length){
    otrosHTML='<p class="slbl">Otros partidos de la jornada — señal líder</p><div class="otros-grid">';
    otros.forEach(partido=>{
      const pRows=rows.filter(d=>d.Partido===partido);
      const ldr=pRows.reduce((a,b)=>(parseNum(b.Rating)||0)>(parseNum(a.Rating)||0)?b:a,pRows[0]);
      const rat=parseNum(ldr.Rating);const shr=parseNum(ldr.Share);const cov=parseNum(ldr.Coview);
      otrosHTML+=`<div class="otro-card">
        <div class="otro-partido">${partido}</div>
        <div class="otro-fecha">${ldr.Fecha||''}</div>
        <div class="otro-canal">Líder: ${ldr.Canal||'—'}</div>
        <div class="otro-nums">
          <div class="otro-num"><div class="otro-val">${rat?rat.toFixed(2):'—'}</div><div class="otro-lbl">Rat%</div></div>
          <div class="otro-num"><div class="otro-val">${shr?shr+'%':'—'}</div><div class="otro-lbl">Share</div></div>
          <div class="otro-num"><div class="otro-val">${cov?cov.toFixed(1):'—'}</div><div class="otro-lbl">Coview</div></div>
        </div>
      </div>`;
    });
    otrosHTML+='</div>';
  }

  document.getElementById('resumen-content').innerHTML=`
    <div class="jornada-banner"><div class="num">0${j}</div><div class="info"><div class="info-title">Jornada ${j}</div><div class="info-date">${fechas.join(' · ')}</div></div></div>
    <p class="slbl">Líderes de la jornada</p>
    <div class="hgrid">${heroHTML}</div>
    ${argHTML}
    ${otrosHTML}`;
}

function renderDeepDive(){
  if(!selectedJornada)return;
  const target=document.getElementById('target-select').value;
  const rows=getRows(selectedJornada,target);
  const partidos=[...new Set(rows.map(d=>d.Partido))];
  const argPartidos=partidos.filter(p=>p.toUpperCase().includes('ARG'));
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  const canales=[{key:'Telefe',lbl:'Telefe',color:'#0D1B3E'},{key:'TyC',lbl:'TyC Sports',color:'#B8924A'},{key:'TVP',lbl:'TVP',color:'#7BB8D4'}];
  const allJRows=allData.filter(d=>d.Partido&&d.Canal&&d.Target===target);
  const jAll=[...new Set(allJRows.map(d=>d.Jornada))].sort((a,b)=>Number(a)-Number(b));

  function rpdo(partido,isArg){
    const pRows=rows.filter(d=>d.Partido===partido);
    const ldr=pRows.reduce((a,b)=>(parseNum(b.Rating)||0)>(parseNum(a.Rating)||0)?b:a,pRows[0]);
    const totRat=pRows.reduce((s,r)=>s+(parseNum(r.Rating)||0),0);
    const alc=parseNum(ldr.Alcance);const cov=parseNum(ldr.Coview);const shr=parseNum(ldr.Share);
    return`<div style="margin-bottom:2rem">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--gold)">
        ${isArg?'<span style="background:var(--gold);color:#fff;font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:4px">Argentina</span>':''}
        <span style="font-size:18px;font-weight:800;text-transform:uppercase;color:var(--navy)">${partido}</span>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">${ldr.Fecha||''} · ${target}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:38px;font-weight:800;color:var(--navy);line-height:1">${totRat?totRat.toFixed(2):'—'}<span style="font-size:13px;color:var(--gold)"> Rat%</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Rating total</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:38px;font-weight:800;color:var(--navy);line-height:1">${shr||'—'}<span style="font-size:13px;color:var(--gold)">%</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Share líder</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:38px;font-weight:800;color:var(--navy);line-height:1">${cov?cov.toFixed(1):'—'}</div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Coview%</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:38px;font-weight:800;color:var(--navy);line-height:1">${alc?(alc/1000000).toFixed(1):'—'}<span style="font-size:13px;color:var(--gold)">${alc?' M':''}</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Alcance</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${canales.map(c=>{const cr=pRows.find(r=>(r.Canal||'').toLowerCase().includes(c.key.toLowerCase()));const rat=cr?parseNum(cr.Rating):null;const shr2=cr?parseNum(cr.Share):null;
          return`<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:0.5px solid var(--border)"><div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:${c.color};margin-bottom:6px">${c.lbl}</div><div style="font-size:26px;font-weight:800;color:var(--navy)">${rat!==null?rat.toFixed(2):'—'}</div><div style="font-size:10px;color:var(--gold);font-weight:700;margin-top:2px">${shr2!==null?shr2+'% shr':'—'}</div></div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const marcas=allData.filter(d=>d.Jornada==selectedJornada&&d.Marca&&d.TRPs).sort((a,b)=>(parseNum(b.TRPs)||0)-(parseNum(a.TRPs)||0));
  const maxTRP=marcas.length?(parseNum(marcas[0].TRPs)||1):1;
  const sovHTML=marcas.length?`<p class="slbl">Ranking marcas — TRPs acumulados</p>
    <div class="card"><div class="ctitle">Top marcas por presencia en tanda</div><div class="csub">TRPs cross todos los partidos · Target: ${target}</div>
    ${marcas.map((m,i)=>`<div class="sov-row"><span class="sov-rank">${String(i+1).padStart(2,'0')}</span><div style="flex:1"><div class="sov-marca">${m.Marca}</div><div class="sov-anunc">${m.Anunciante||''}</div></div><div class="sov-bw"><div class="sov-bar" style="width:${Math.round((parseNum(m.TRPs)||0)/maxTRP*100)}%"></div></div><span class="sov-trp">${(parseNum(m.TRPs)||0).toFixed(1)} TRPs</span></div>`).join('')}
    </div>`:'';

  const evolHTML=`<p class="slbl">Evolución de Rating% — todas las jornadas</p>
    <div class="card"><div class="ctitle">Tendencia histórica por canal</div><div class="csub">Rating% · Target: ${target}</div>
    <div class="leg">${canales.map(c=>`<span class="li"><span class="ld" style="background:${c.color}"></span>${c.lbl}</span>`).join('')}</div>
    <div style="position:relative;height:240px"><canvas id="chartEvol" role="img" aria-label="Evolución rating">Evolución de rating por jornada</canvas></div></div>`;

  let html='';
  if(argPartidos.length)html+='<p class="slbl">Partido de Argentina</p>'+argPartidos.map(p=>rpdo(p,true)).join('');
  if(otrosPartidos.length)html+='<p class="slbl">Resto de partidos</p>'+otrosPartidos.map(p=>rpdo(p,false)).join('');
  html+=`<div class="two">${sovHTML}${evolHTML}</div>`;
  document.getElementById('deepdive-content').innerHTML=html;

  setTimeout(()=>{
    const ctx=document.getElementById('chartEvol');if(!ctx)return;
    if(chartEvol)chartEvol.destroy();
    chartEvol=new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels:jAll.map(j=>'J'+j),datasets:canales.map(c=>({label:c.lbl,data:jAll.map(jj=>{const r=allJRows.filter(d=>d.Jornada==jj).find(d=>(d.Canal||'').toLowerCase().includes(c.key.toLowerCase()));return r?parseNum(r.Rating):null;}),borderColor:c.color,backgroundColor:'transparent',tension:0.3,pointRadius:5,borderWidth:2.5}))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#4A5568'}},x:{grid:{display:false},ticks:{font:{size:11},color:'#4A5568'}}}}
    });
  },100);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('on');
}

function showError(msg){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
  document.getElementById('error-state').innerHTML='<div class="error-msg">'+msg+'</div>';
}

loadData();
<\/script>
</body>
</html>
