<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSA Mundial 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B3E;--gold:#B8924A;--sky:#5BA3C9;--skylt:#C8E8F5;--bg:#F2F4F8;--surface:#fff;--border:rgba(13,27,62,0.12);--text:#0D1B3E;--text2:#4A5568;--r:12px}
body{font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--navy);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:0.1em}
.hdr-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:0.06em;text-transform:uppercase;text-align:center}
.hdr-title em{color:var(--gold);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-lbl{font-size:9px;color:var(--skylt);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.fecha-select{padding:6px 14px;border-radius:20px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;outline:none;appearance:none;text-align:center}
.fecha-select option{background:var(--navy);color:#fff}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:1.5rem 2rem}

/* TARGET FILTER */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r)}
.filter-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.target-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s}
.target-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* SECTION LABEL */
.slbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;margin-top:1.25rem}

/* TOP 3 CARDS */
.top3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.kcard{background:var(--navy);border-radius:var(--r);padding:1.1rem 1.3rem;position:relative;overflow:hidden}
.kcard-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--skylt);margin-bottom:4px}
.kcard-canal{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em}
.kcard-val{font-size:44px;font-weight:800;color:#fff;line-height:1}
.kcard-unit{font-size:14px;color:var(--gold);font-weight:700}
.kcard-delta{font-size:11px;font-weight:700;margin-top:5px}
.kcard-delta.up{color:#4ADE80}.kcard-delta.dn{color:#F87171}.kcard-delta.neu{color:rgba(255,255,255,0.4)}

/* PARTIDO SECTION */
.partido-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:1rem}
.partido-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:8px;border-bottom:1.5px solid var(--gold)}
.partido-badge{background:var(--gold);color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em}
.partido-name{font-size:15px;font-weight:800;text-transform:uppercase;color:var(--navy)}
.partido-fecha{font-size:11px;color:var(--text2);margin-left:auto}
.canales-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.canal-card{background:var(--bg);border-radius:8px;padding:10px 8px;text-align:center;border:0.5px solid var(--border)}
.canal-name{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.canal-rat{font-size:28px;font-weight:800;color:var(--navy);line-height:1}
.canal-metrics{display:flex;justify-content:center;gap:10px;margin-top:5px}
.canal-metric{font-size:10px;color:var(--text2);font-weight:600}
.canal-metric span{color:var(--gold);font-weight:700}

/* MARCAS */
.marcas-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:1rem}
.marcas-filter{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.mf-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s}
.mf-chip.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.sov-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.sov-row:last-child{border-bottom:none}
.sov-rank{font-size:16px;font-weight:800;color:var(--gold);min-width:24px}
.sov-marca{flex:1;font-weight:600;color:var(--navy);font-size:12px}
.sov-anunc{font-size:10px;color:var(--text2)}
.sov-bw{flex:2;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.sov-bar{height:100%;border-radius:3px;background:var(--gold);transition:width 0.5s ease}
.sov-trp{font-size:13px;font-weight:800;color:var(--navy);min-width:65px;text-align:right}

/* LOADING / ERROR */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;color:var(--text2)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fee2e2;border:0.5px solid #fca5a5;border-radius:var(--r);padding:1.5rem;color:#7f1d1d;text-align:center;margin:2rem 0;font-size:13px;line-height:1.6}
footer{text-align:center;padding:1.25rem;font-size:10px;color:var(--text2);border-top:0.5px solid var(--border);margin-top:1rem}
@media(max-width:768px){
  header{padding:0 1rem}.container{padding:1rem}
  .top3{grid-template-columns:1fr}.canales-grid{grid-template-columns:1fr}
  .hdr-title{font-size:13px}
}
</style>
</head>
<body>
<header>
  <div class="hdr-logo">OSA</div>
  <div class="hdr-title">OSA <em>Mundial</em> 2026</div>
  <div class="hdr-right">
    <div>
      <div class="hdr-lbl">Fecha FIFA</div>
      <select class="fecha-select" id="fecha-select" onchange="onFechaChange()">
        <option>Cargando...</option>
      </select>
    </div>
  </div>
</header>

<div class="container">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <span>Cargando datos Kantar IBOPE&hellip;</span>
  </div>
  <div id="error-state" style="display:none"></div>
  <div id="main-content" style="display:none">

    <!-- TARGET FILTER -->
    <div class="filter-bar">
      <span class="filter-lbl">Target</span>
      <button class="target-chip on" onclick="setTarget('Hogares',this)">Hogares</button>
      <button class="target-chip" onclick="setTarget('Personas',this)">Personas</button>
      <button class="target-chip" onclick="setTarget('20+',this)">20+</button>
    </div>

    <div id="dashboard-content"></div>

  </div>
</div>
<footer>Fuente: Kantar IBOPE Media &middot; OSA One Step Ahead &middot; Datos actualizados diariamente</footer>

<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRk-5uM_irUx6DNa8jEeL24hYdeyJhHamNZWAEqwBSLcWj8EwINeEnWlNzP5VlwiubzMdnih5iKlfJc/pub?output=csv';
let allData=[],fechas=[],selectedFecha=null,selectedTarget='Hogares',selectedMarcaFilter='TOTAL',chartMarcas=null;

function pn(s){
  if(s===null||s===undefined||String(s).trim()===''||String(s).trim()==='.')return null;
  return parseFloat(String(s).replace(',','.'));
}

function loadData(){
  Papa.parse(SHEET_URL,{
    download:true,skipEmptyLines:true,
    complete:function(r){
      try{
        let hdrIdx=-1;
        for(let i=0;i<r.data.length;i++){
          if(r.data[i].some(c=>String(c).trim()==='Jornada')){hdrIdx=i;break;}
        }
        if(hdrIdx<0){showError('No se encontró la cabecera "Jornada" en el Sheet.');return;}
        const headers=r.data[hdrIdx].map(h=>String(h).trim());
        allData=[];
        for(let i=hdrIdx+1;i<r.data.length;i++){
          const row=r.data[i];
          if(!row[0]||String(row[0]).trim()==='')continue;
          const obj={};
          headers.forEach((h,j)=>obj[h]=row[j]?String(row[j]).trim():'');
          if(obj['Jornada']&&obj['PARTIDO']&&obj['CANAL'])allData.push(obj);
        }
        fechas=[...new Set(allData.map(d=>d['FECHA FIFA']))].filter(Boolean);
        if(!fechas.length){showError('No se encontraron fechas en el Sheet.');return;}
        // Populate fecha select
        const sel=document.getElementById('fecha-select');
        sel.innerHTML=fechas.map(f=>`<option value="${f}">${f}</option>`).join('');
        selectedFecha=fechas[fechas.length-1];
        sel.value=selectedFecha;
        document.getElementById('loading-state').style.display='none';
        document.getElementById('main-content').style.display='block';
        renderDashboard();
      }catch(e){showError('Error procesando datos: '+e.message);}
    },
    error:function(){showError('No se pudo cargar el Sheet. Verificá que la URL sea pública.');}
  });
}

function onFechaChange(){
  selectedFecha=document.getElementById('fecha-select').value;
  renderDashboard();
}

function setTarget(t,btn){
  selectedTarget=t;
  document.querySelectorAll('.target-chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderDashboard();
}

function setMarcaFilter(f,btn){
  selectedMarcaFilter=f;
  document.querySelectorAll('.mf-chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderMarcas();
}

function getRows(fecha,target){return allData.filter(d=>d['FECHA FIFA']===fecha&&d['TARGET']===target);}
function getCanal(rows,canal){return rows.find(r=>String(r['CANAL']||'').toUpperCase().includes(canal.toUpperCase()));}

function getPrevFecha(fecha){
  const idx=fechas.indexOf(fecha);
  return idx>0?fechas[idx-1]:null;
}

function renderDashboard(){
  const rows=getRows(selectedFecha,selectedTarget);
  const prevFecha=getPrevFecha(selectedFecha);
  const prevRows=prevFecha?getRows(prevFecha,selectedTarget):[];
  const canales=[{key:'TELEFE',lbl:'Telefe'},{key:'TYC',lbl:'TyC Sports'},{key:'TVP',lbl:'TVP'}];

  // Find leader
  let leader=null,leaderRat=0;
  canales.forEach(c=>{
    const r=getCanal(rows,c.key);
    const rat=r?pn(r['Rat%'])||0:0;
    if(rat>leaderRat){leaderRat=rat;leader={...c,rat,row:r};}
  });

  // Coview total (leader canal)
  const ldrRow=leader?leader.row:null;
  const cov=ldrRow?pn(ldrRow['Coview%']):null;
  const prevLdrRow=leader?getCanal(prevRows,leader.key):null;
  const prevCov=prevLdrRow?pn(prevLdrRow['Coview%']):null;
  const prevLdrRat=prevLdrRow?pn(prevLdrRow['Rat%']):null;

  // Marcas activas count
  const marcasRows=allData.filter(d=>d['FECHA FIFA']===selectedFecha&&d['Marca']&&d['TRPs']);
  const marcasCount=[...new Set(marcasRows.map(d=>d['Marca']))].length;
  const prevMarcasRows=prevFecha?allData.filter(d=>d['FECHA FIFA']===prevFecha&&d['Marca']&&d['TRPs']):[];
  const prevMarcasCount=[...new Set(prevMarcasRows.map(d=>d['Marca']))].length;

  function deltaHTML(curr,prev,decimals=2){
    if(prev===null||prev===undefined||curr===null)return '';
    const d=curr-prev;
    const cls=d>0?'up':d<0?'dn':'neu';
    const arrow=d>0?'&#9650;':d<0?'&#9660;':'&mdash;';
    return '<div class="kcard-delta '+cls+'">'+arrow+' '+Math.abs(d).toFixed(decimals)+' vs fecha ant.</div>';
  }

  // TOP 3 CARDS
  const top3HTML=
    // Lider
    '<div class="kcard">'+
      '<div class="kcard-title">Líder de la jornada</div>'+
      '<div class="kcard-canal">'+(leader?leader.lbl:'&mdash;')+'</div>'+
      '<div class="kcard-val">'+(leader&&leader.rat?leader.rat.toFixed(2):'&mdash;')+'<span class="kcard-unit"> Rat%</span></div>'+
      deltaHTML(leader?leader.rat:null,prevLdrRat)+
    '</div>'+
    // Coview
    '<div class="kcard">'+
      '<div class="kcard-title">Coview</div>'+
      '<div class="kcard-canal">&nbsp;</div>'+
      '<div class="kcard-val">'+(cov?cov.toFixed(1):'&mdash;')+'<span class="kcard-unit">%</span></div>'+
      deltaHTML(cov,prevCov,1)+
    '</div>'+
    // Marcas activas
    '<div class="kcard">'+
      '<div class="kcard-title">Marcas activas</div>'+
      '<div class="kcard-canal">&nbsp;</div>'+
      '<div class="kcard-val">'+(marcasCount||'&mdash;')+'</div>'+
      (prevMarcasCount?deltaHTML(marcasCount,prevMarcasCount,0):'')+
    '</div>';

  // PARTIDOS
  const partidos=[...new Set(rows.map(d=>d['PARTIDO']))].filter(Boolean);
  const argPartidos=partidos.filter(p=>p.toUpperCase().includes('ARG'));
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));

  function renderPartido(partido,isArg){
    const pRows=rows.filter(d=>d['PARTIDO']===partido);
    const fecha=pRows[0]?pRows[0]['FECHA FIFA']:'';
    const hora=pRows[0]?pRows[0]['HORA']:'';
    return '<div class="partido-section">'+
      '<div class="partido-header">'+
        (isArg?'<span class="partido-badge">Argentina</span>':'')+
        '<span class="partido-name">'+partido+'</span>'+
        '<span class="partido-fecha">'+(hora||fecha)+'</span>'+
      '</div>'+
      '<div class="canales-grid">'+
        canales.map(c=>{
          const cr=getCanal(pRows,c.key);
          const rat=cr?pn(cr['Rat%']):null;
          const shr=cr?pn(cr['Shr%']):null;
          const cov2=cr?pn(cr['Coview%']):null;
          return '<div class="canal-card">'+
            '<div class="canal-name">'+c.lbl+'</div>'+
            '<div class="canal-rat">'+(rat!==null?rat.toFixed(2):'&mdash;')+'</div>'+
            '<div class="canal-metrics">'+
              '<span class="canal-metric">Shr <span>'+(shr!==null?shr+'%':'&mdash;')+'</span></span>'+
              '<span class="canal-metric">Cov <span>'+(cov2!==null?cov2.toFixed(1):'&mdash;')+'</span></span>'+
            '</div>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  }

  let partidosHTML='';
  if(argPartidos.length){
    partidosHTML+='<p class="slbl">Argentina</p>'+argPartidos.map(p=>renderPartido(p,true)).join('');
  }
  if(otrosPartidos.length){
    partidosHTML+='<p class="slbl">Otros partidos</p>'+otrosPartidos.map(p=>renderPartido(p,false)).join('');
  }

  document.getElementById('dashboard-content').innerHTML=
    '<p class="slbl">Resumen de la jornada</p>'+
    '<div class="top3">'+top3HTML+'</div>'+
    partidosHTML+
    '<p class="slbl">Marcas</p>'+
    '<div class="marcas-card">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">'+
        '<div style="font-size:13px;font-weight:800;text-transform:uppercase;color:var(--navy)">Ranking por TRPs</div>'+
        '<div class="marcas-filter">'+
          '<button class="mf-chip '+(selectedMarcaFilter==='TOTAL'?'on':'')+'" onclick="setMarcaFilter('TOTAL',this)">Total jornada</button>'+
          '<button class="mf-chip '+(selectedMarcaFilter==='ARG'?'on':'')+'" onclick="setMarcaFilter('ARG',this)">Argentina</button>'+
          '<button class="mf-chip '+(selectedMarcaFilter==='OTROS'?'on':'')+'" onclick="setMarcaFilter('OTROS',this)">Otros partidos</button>'+
        '</div>'+
      '</div>'+
      '<div id="marcas-list"></div>'+
    '</div>';

  renderMarcas();
}

function renderMarcas(){
  const mRows=allData.filter(d=>d['FECHA FIFA']===selectedFecha&&d['Marca']&&d['TRPs']);
  let filtered=mRows;
  if(selectedMarcaFilter==='ARG'){
    const argPartidos=allData.filter(d=>d['FECHA FIFA']===selectedFecha&&d['PARTIDO']&&d['PARTIDO'].toUpperCase().includes('ARG')).map(d=>d['PARTIDO']);
    filtered=mRows.filter(d=>argPartidos.includes(d['PARTIDO']));
  } else if(selectedMarcaFilter==='OTROS'){
    filtered=mRows.filter(d=>!d['PARTIDO']||!d['PARTIDO'].toUpperCase().includes('ARG'));
  }

  const marcasMap={};
  filtered.forEach(r=>{
    const k=r['Marca'];
    if(!marcasMap[k])marcasMap[k]={marca:k,anunciante:r['Anunciante']||'',trp:0};
    marcasMap[k].trp+=(pn(r['TRPs'])||0);
  });
  const sorted=Object.values(marcasMap).sort((a,b)=>b.trp-a.trp).slice(0,10);
  const maxTRP=sorted[0]?sorted[0].trp:1;

  const el=document.getElementById('marcas-list');
  if(!el)return;
  if(!sorted.length){
    el.innerHTML='<p style="color:var(--text2);font-size:13px;padding:.5rem 0">Sin datos de marcas para esta fecha. Cargá la columna TRPs en el Sheet.</p>';
    return;
  }
  el.innerHTML=sorted.map((m,i)=>
    '<div class="sov-row">'+
      '<span class="sov-rank">'+String(i+1).padStart(2,'0')+'</span>'+
      '<div style="flex:1"><div class="sov-marca">'+m.marca+'</div><div class="sov-anunc">'+m.anunciante+'</div></div>'+
      '<div class="sov-bw"><div class="sov-bar" style="width:'+Math.round(m.trp/maxTRP*100)+'%"></div></div>'+
      '<span class="sov-trp">'+m.trp.toFixed(1)+' TRPs</span>'+
    '</div>'
  ).join('');
}

function showError(msg){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
  document.getElementById('error-state').innerHTML='<div class="error-msg">'+msg+'</div>';
}

loadData();
</script>
</body>
</html>
