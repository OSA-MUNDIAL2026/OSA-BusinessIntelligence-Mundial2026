<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B3E;--gold:#B8924A;--sky:#5BA3C9;--skylt:#C8E8F5;--bg:#F2F4F8;--surface:#fff;--border:rgba(13,27,62,0.12);--text:#0D1B3E;--text2:#4A5568;--r:12px}
body{font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:0 2.5rem;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo img{height:30px;filter:invert(1) brightness(10)}
.hdr-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:0.06em;text-transform:uppercase;text-align:center}
.hdr-title em{color:var(--gold);font-style:normal}
.hdr-right{text-align:right;min-width:100px}
.hdr-lbl{font-size:9px;color:var(--skylt);letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.hdr-val{font-size:14px;color:#fff;font-weight:700;margin-top:3px}
.tabbar{background:var(--navy);border-top:1px solid rgba(255,255,255,0.1);display:flex;padding:0 2.5rem;gap:4px}
.tab{padding:11px 24px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
.tab:hover{color:#fff}
.tab.on{background:var(--sky);color:#fff;border-bottom-color:var(--sky)}
.container{max-width:1200px;margin:0 auto;padding:2rem 2.5rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.jbar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.jlbl{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.slbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:4px}
.jornada-banner{display:inline-flex;align-items:center;gap:14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 22px;margin-bottom:1.5rem}
.jornada-banner .num{font-size:48px;font-weight:800;color:var(--gold);line-height:1}
.jornada-banner .info-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy)}
.jornada-banner .info-date{font-size:12px;color:var(--text2);margin-top:2px}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem}
.hcard{background:var(--navy);border-radius:var(--r);padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.hcard.ldr{border:2px solid var(--gold)}
.hlbl{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--skylt);margin-bottom:6px}

.sov-marca{flex:1;font-weight:600;color:var(--navy);font-size:13px}

.sov-bw{flex:1.5;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.sov-bar{height:100%;border-radius:3px;background:var(--gold)}
.sov-trp{font-size:14px;font-weight:800;color:var(--navy);min-width:70px;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}

<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRk-5uM_irUx6DNa8jEeL24hYdeyJhHamNZWAEqwBSLcWj8EwINeEnWlNzP5VlwiubzMdnih5iKlfJc/pub?output=csv';
let allData=[],jornadas=[],selectedJornada=null,chartEvol=null;

function pn(s){
  if(s===null||s===undefined||s.toString().trim()===''||s.toString().trim()==='.')return null;
  return parseFloat(s.toString().replace(',','.'));
}

function loadData(){
  Papa.parse(SHEET_URL,{
    download:true,skipEmptyLines:true,
    complete:function(r){
      try{
        // Find header row (contains "Jornada")
        let hdrIdx=-1;
        for(let i=0;i<r.data.length;i++){
          if(r.data[i].some(c=>c.toString().trim()==='Jornada')){hdrIdx=i;break;}
        }
        if(hdrIdx<0){showError('No se encontr\u00f3 la cabecera en el Sheet. Verific\u00e1 que la fila tenga la columna "Jornada".');return;}
        const headers=r.data[hdrIdx].map(h=>h.trim());
        allData=[];
        for(let i=hdrIdx+1;i<r.data.length;i++){
          const row=r.data[i];
          if(!row[0]||row[0].toString().trim()==='')continue;
          const obj={};
          headers.forEach((h,j)=>obj[h]=row[j]?row[j].toString().trim():'');
          if(obj['Jornada']&&obj['PARTIDO']&&obj['CANAL']) allData.push(obj);
        }
        jornadas=[...new Set(allData.map(d=>d['Jornada']))].sort((a,b)=>Number(a)-Number(b));
        if(!jornadas.length){showError('No se encontraron datos de partidos en el Sheet.');return;}
        document.getElementById('loading-state').style.display='none';
        document.getElementById('main-content').style.display='block';
        document.getElementById('chips').innerHTML=jornadas.map(j=>`<button class="chip" id="chip-${j}" onclick="selectJornada('${j}')">J${j}</button>`).join('');
        selectJornada(jornadas[jornadas.length-1]);
      }catch(e){showError('Error procesando datos: '+e.message);}
    },
    error:function(e){showError('No se pudo cargar el Sheet. Verific\u00e1 que la URL sea p\u00fablica.<br><small>'+e+'</small>');}
  });
}

function selectJornada(j){
  selectedJornada=j;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const ch=document.getElementById('chip-'+j);if(ch)ch.classList.add('on');
  const rows=getRows(j,'Hogares');
  const fechas=[...new Set(rows.map(d=>d['FECHA FIFA']))];
  document.getElementById('hdr-lbl').textContent='Fecha '+j;
  document.getElementById('hdr-val').textContent=fechas[0]||'—';
  renderResumen(j);
  renderDeepDive();
}

function getRows(j,target){
  return allData.filter(d=>d['Jornada']==j&&d['TARGET']===target);
}
function getCanal(rows,canal){
  return rows.find(r=>(r['CANAL']||'').toUpperCase()===canal.toUpperCase()||(r['CANAL']||'').toUpperCase().includes(canal.toUpperCase()));
}

function renderResumen(j){
  const rows=getRows(j,'Hogares');
  const prevJ=jornadas[jornadas.indexOf(j)-1];
  const prevRows=prevJ?getRows(prevJ,'Hogares'):[];
  const canales=[{key:'TELEFE',lbl:'Telefe'},{key:'TYC',lbl:'TyC Sports'},{key:'TVP',lbl:'TVP'}];
  const withRat=canales.map(c=>{
    const r=getCanal(rows,c.key);
    return{...c,rat:r?pn(r['Rat%'])||0:0,shr:r?pn(r['Shr%'])||0:0,cov:r?pn(r['Coview%']):null,alc:r?pn(r['Alcance Neto']):null};
  });
  const leader=withRat.reduce((a,b)=>b.rat>a.rat?b:a);
  const fechas=[...new Set(rows.map(d=>d['FECHA FIFA']))];

  const heroHTML=withRat.map(c=>{
    const pr=getCanal(prevRows,c.key);
    const prevRat=pr?pn(pr['Rat%']):null;
    const delta=prevRat!==null?(c.rat-prevRat):null;
    return`<div class="hcard ${c.key===leader.key?'ldr':''}">
      ${c.key===leader.key?'<span class="lbadge">L\u00edder</span>':''}
      <div class="hlbl">${c.lbl}</div>
      <div class="hval">${c.rat?c.rat.toFixed(2):'&mdash;'}<span class="hunit"> Rat%</span></div>
      <div class="hsub">Share: ${c.shr||'&mdash;'}%</div>
      ${delta!==null?`<div class="hdelta ${delta>=0?'up':'dn'}">${delta>=0?'&#9650;':'&#9660;'} ${Math.abs(delta).toFixed(2)} vs jornada ant.</div>`:''}
    </div>`;
  }).join('');

  const argRows=rows.filter(d=>d['PARTIDO']&&d['PARTIDO'].toUpperCase().includes('ARG'));
  const argPartido=argRows.length?argRows[0]['PARTIDO']:null;
  let argHTML='';
  if(argPartido){
    const argLider=argRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,argRows[0]);
    const lRat=pn(argLider['Rat%']);const lShr=pn(argLider['Shr%']);
    const lCov=pn(argLider['Coview%']);const lAlc=pn(argLider['Alcance Neto']);
    argHTML=`<p class="slbl">N\u00fameros de Argentina</p>
    <div class="arg">
      <div class="argt">Selecci\u00f3n Argentina</div>
      <div class="arg-partido">${argPartido}</div>
      <div class="arg-lider">Se\u00f1al l\u00edder: ${argLider['CANAL']}</div>
      <div class="argnums">
        <div class="anum"><div class="anv">${lRat?lRat.toFixed(2):'&mdash;'}<span class="anu"> Rat%</span></div><div class="anl">Rating ${argLider['CANAL']}</div></div>
        <div class="anum"><div class="anv">${lShr||'&mdash;'}<span class="anu">%</span></div><div class="anl">Share</div></div>
        <div class="anum"><div class="anv">${lCov?lCov.toFixed(1):'&mdash;'}</div><div class="anl">Coview%</div></div>
        <div class="anum"><div class="anv">${lAlc?(lAlc/1000000).toFixed(1):'&mdash;'}<span class="anu">${lAlc?' M':''}</span></div><div class="anl">Alcance</div></div>
      </div>
    </div>`;
  }

  const partidos=[...new Set(rows.map(d=>d['PARTIDO']))];
  const otros=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  let otrosHTML='';
  if(otros.length){
    otrosHTML='<p class="slbl">Otros partidos de la jornada &mdash; se\u00f1al l\u00edder</p><div class="otros-grid">';
    otros.forEach(partido=>{
      const pRows=rows.filter(d=>d['PARTIDO']===partido);
      const ldr=pRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,pRows[0]);
      const rat=pn(ldr['Rat%']);const shr=pn(ldr['Shr%']);const cov=pn(ldr['Coview%']);
      otrosHTML+=`<div class="otro-card">
        <div class="otro-partido">${partido}</div>
        <div class="otro-fecha">${ldr['FECHA FIFA']||''}</div>
        <div class="otro-canal">L\u00edder: ${ldr['CANAL']||'&mdash;'}</div>
        <div class="otro-nums">
          <div class="otro-num"><div class="otro-val">${rat?rat.toFixed(2):'&mdash;'}</div><div class="otro-lbl">Rat%</div></div>
          <div class="otro-num"><div class="otro-val">${shr?shr+'%':'&mdash;'}</div><div class="otro-lbl">Share</div></div>
          <div class="otro-num"><div class="otro-val">${cov?cov.toFixed(1):'&mdash;'}</div><div class="otro-lbl">Coview</div></div>
        </div>
      </div>`;
    });
    otrosHTML+='</div>';
  }

  document.getElementById('resumen-content').innerHTML=`
    <div class="jornada-banner"><div class="num">0${j}</div><div class="info"><div class="info-title">Jornada ${j}</div><div class="info-date">${fechas.join(' &middot; ')}</div></div></div>
    <p class="slbl">L\u00edderes de la jornada</p>
    <div class="hgrid">${heroHTML}</div>
    ${argHTML}${otrosHTML}`;
}

function renderDeepDive(){
  if(!selectedJornada)return;
  const target=document.getElementById('target-select').value;
  const rows=getRows(selectedJornada,target);
  const partidos=[...new Set(rows.map(d=>d['PARTIDO']))];
  const argPartidos=partidos.filter(p=>p.toUpperCase().includes('ARG'));
  const otrosPartidos=partidos.filter(p=>!p.toUpperCase().includes('ARG'));
  const canales=[{key:'TELEFE',lbl:'Telefe',color:'#0D1B3E'},{key:'TYC',lbl:'TyC Sports',color:'#B8924A'},{key:'TVP',lbl:'TVP',color:'#7BB8D4'}];
  const allJRows=allData.filter(d=>d['TARGET']===target);
  const jAll=[...new Set(allJRows.map(d=>d['Jornada']))].sort((a,b)=>Number(a)-Number(b));

  function rpdo(partido,isArg){
    const pRows=rows.filter(d=>d['PARTIDO']===partido);
    const ldr=pRows.reduce((a,b)=>(pn(b['Rat%'])||0)>(pn(a['Rat%'])||0)?b:a,pRows[0]);
    const totRat=pRows.reduce((s,r)=>s+(pn(r['Rat%'])||0),0);
    const alc=pn(ldr['Alcance Neto']);const cov=pn(ldr['Coview%']);const shr=pn(ldr['Shr%']);
    return`<div style="margin-bottom:2rem">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--gold)">
        ${isArg?'<span style="background:var(--gold);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:4px;text-transform:uppercase">Argentina</span>':''}
        <span style="font-size:18px;font-weight:800;text-transform:uppercase;color:var(--navy)">${partido}</span>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">${ldr['FECHA FIFA']||''} &middot; ${target}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:36px;font-weight:800;color:var(--navy);line-height:1">${totRat?totRat.toFixed(2):'&mdash;'}<span style="font-size:13px;color:var(--gold)"> Rat%</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Rating total</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:36px;font-weight:800;color:var(--navy);line-height:1">${shr||'&mdash;'}<span style="font-size:13px;color:var(--gold)">%</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Share l\u00edder</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:36px;font-weight:800;color:var(--navy);line-height:1">${cov?cov.toFixed(1):'&mdash;'}</div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Coview%</div></div>
        <div class="card" style="text-align:center;padding:1rem"><div style="font-size:36px;font-weight:800;color:var(--navy);line-height:1">${alc?(alc/1000000).toFixed(1):'&mdash;'}<span style="font-size:13px;color:var(--gold)">${alc?' M':''}</span></div><div style="font-size:9px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;font-weight:600">Alcance</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${canales.map(c=>{const cr=getCanal(pRows,c.key);const rat=cr?pn(cr['Rat%']):null;const s=cr?pn(cr['Shr%']):null;
          return`<div style="background:var(--bg);border-radius:8px;padding:12px;text-align:center;border:0.5px solid var(--border)">
            <div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:${c.color};margin-bottom:6px">${c.lbl}</div>
            <div style="font-size:26px;font-weight:800;color:var(--navy)">${rat!==null?rat.toFixed(2):'&mdash;'}</div>
            <div style="font-size:10px;color:var(--gold);font-weight:700;margin-top:2px">${s!==null?s+'% shr':'&mdash;'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const evolHTML=`<p class="slbl">Evoluci\u00f3n de Rating% &mdash; todas las jornadas</p>
    <div class="card"><div class="ctitle">Tendencia hist\u00f3rica por canal</div><div class="csub">Rating% &middot; Target: ${target}</div>
    <div class="leg">${canales.map(c=>`<span class="li"><span class="ld" style="background:${c.color}"></span>${c.lbl}</span>`).join('')}</div>
    <div style="position:relative;height:240px"><canvas id="chartEvol"></canvas></div></div>`;

  let html='';
  if(argPartidos.length)html+='<p class="slbl">Partido de Argentina</p>'+argPartidos.map(p=>rpdo(p,true)).join('');
  if(otrosPartidos.length)html+='<p class="slbl">Resto de partidos</p>'+otrosPartidos.map(p=>rpdo(p,false)).join('');
  html+=evolHTML;
  if(!html.includes('partido'))html='<p style="color:var(--text2);padding:2rem 0;text-align:center">Sin datos para esta combinaci\u00f3n de jornada y target.</p>'+evolHTML;
  document.getElementById('deepdive-content').innerHTML=html;

  setTimeout(()=>{
    const ctx=document.getElementById('chartEvol');if(!ctx)return;
    if(chartEvol)chartEvol.destroy();
    chartEvol=new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels:jAll.map(j=>'J'+j),datasets:canales.map(c=>({label:c.lbl,
        data:jAll.map(jj=>{const r=allJRows.filter(d=>d['Jornada']==jj).find(d=>(d['CANAL']||'').toUpperCase().includes(c.key));return r?pn(r['Rat%']):null;}),
        borderColor:c.color,backgroundColor:'transparent',tension:0.3,pointRadius:5,borderWidth:2.5}))},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#4A5568'}},
          x:{grid:{display:false},ticks:{font:{size:11},color:'#4A5568'}}}}
    });
  },150);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('on');
}
function showError(msg){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
  document.getElementById('error-state').innerHTML='<div class="error-msg">'+msg+'</div>';
}
loadData();
</script>
</body>
</html>
